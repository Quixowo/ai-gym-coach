name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend
        run: pip install -e "./backend[dev]"

      - name: Lint
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          JWT_SECRET: test-secret-not-for-production
          REDIS_URL: redis://localhost:6379/0
          # No real model keys: the eval suites run entirely on recorded fixtures
          # (CLAUDE.md rule 10). Set explicitly empty so a stray developer key in
          # the runner env can never turn CI into a live-API run.
          ANTHROPIC_API_KEY: ""
          VOYAGE_API_KEY: ""
        run: pytest
